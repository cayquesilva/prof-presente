version: "3.8"

services:
  # Serviço do Backend (API)
  backend:
    image: cayquesilva/simplicorre-backend:2.4.4
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@eduagenda_db:5432/${POSTGRES_DB}?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3000
      - NODE_ENV=production
      - CORS_ORIGIN=https://corre.simplisoft.com.br
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
      - PUBLIC_API_URL=https://corre.simplisoft.com.br/api
      - AMQP_URL=amqp://guest:guest@eduagenda_rabbitmq:5672
      - REDIS_URL=redis://eduagenda_redis:6379
      - FACIAL_SERVICE_URL=http://eduagenda_facialrec:3002/api
    volumes:
      - eduagenda_uploads:/app/uploads
    networks:
      - public-proxy-v2
      - interna_network_agenda
    depends_on:
      - eduagenda_db
    command: >
      sh -c "
        echo '--- DEBUG STARTUP ---' &&
        echo 'Tentando conectar ao banco: eduagenda_db:5432' &&
        echo 'DATABASE_URL detectada (mascarada): postgresql://***:***@eduagenda_db:5432/***' &&
        sleep 10 &&
        echo 'Sincronizando schema (prisma db push)...' &&
        npx prisma migrate deploy &&
        echo 'Iniciando servidor...' &&
        npm start
      "
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=public-proxy-v2"
        - "traefik.http.routers.eduagenda-backend.rule=Host(`corre.simplisoft.com.br`) && (PathPrefix(`/api`) || PathPrefix(`/uploads`) || PathPrefix(`/socket.io`))"
        - "traefik.http.routers.eduagenda-backend.entrypoints=websecure"
        - "traefik.http.routers.eduagenda-backend.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.eduagenda-backend.priority=100"
        - "traefik.http.services.eduagenda-backend.loadbalancer.server.port=3000"

  eduagenda_redis:
    image: redis:alpine
    networks:
      - interna_network_agenda
    deploy:
      replicas: 1
      placement:
        constraints: [ node.role == manager ]

  eduagenda_rabbitmq:
    image: rabbitmq:3-management-alpine
    networks:
      - interna_network_agenda
    deploy:
      replicas: 1

  # Serviço do Frontend (React + Nginx)
  frontend:
    image: cayquesilva/simplicorre-frontend:2.4.4
    environment:
      - VITE_API_URL=https://corre.simplisoft.com.br/api
    networks:
      - public-proxy-v2
    depends_on:
      - backend
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=public-proxy-v2"
        - "traefik.http.routers.eduagenda-frontend.rule=Host(`corre.simplisoft.com.br`)"
        - "traefik.http.routers.eduagenda-frontend.entrypoints=websecure"
        - "traefik.http.routers.eduagenda-frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.eduagenda-frontend.priority=10"
        - "traefik.http.services.eduagenda-frontend.loadbalancer.server.port=80"

  # Serviço do Banco de Dados (PostgreSQL)
  eduagenda_db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_v5:/var/lib/postgresql/data
    networks:
      - interna_network_agenda
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      placement:
        constraints: [ node.role == manager ]

  eduagenda_facialrec:
    image: cayquesilva/simplicorre-facialrec:2.4.2
    environment:
      - PORT=3002
      - PUBLIC_API_URL=https://corre.simplisoft.com.br/api
    networks:
      - interna_network_agenda
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

volumes:
  postgres_data_v5:
  eduagenda_uploads:


networks:
  interna_network_agenda:
    driver: overlay
    attachable: true
  public-proxy-v2:
    external: true
